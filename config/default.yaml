# FKCrypto — Default Configuration
# Override with environment variables or custom YAML.

llm:
  provider: openai
  model: gpt-4o-mini
  fallback_model: gpt-3.5-turbo
  temperature: 0.1
  max_tokens: 500
  timeout: 30
  retries: 3

data_sources:
  ccxt:
    exchange: binance
    api_key: "${CCXT_API_KEY}"
    secret: "${CCXT_SECRET}"
    options:
      defaultType: spot
      enableRateLimit: true
  coingecko:
    api_key: "${COINGECKO_API_KEY}"
    base_url: https://api.coingecko.com/api/v3
  cryptopanic:
    api_key: "${CRYPTOPANIC_API_KEY}"
    base_url: https://cryptopanic.com/api/v1
  lunarcrush:
    api_key: "${LUNARCRUSH_API_KEY}"
    base_url: https://api.lunarcrush.com/v4
  serpapi:
    api_key: "${SERPAPI_API_KEY}"

trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
  timeframe: 1h
  mode: paper

risk:
  max_positions: 5
  risk_per_trade: 0.02
  max_exposure: 0.5
  stop_loss: 0.05
  max_daily_loss: 0.05
  max_drawdown: 0.15

sentiment:
  sources:
    cryptopanic:
      enabled: true
      api_key: "${CRYPTOPANIC_API_KEY}"
    serpapi:
      enabled: true
      api_key: "${SERPAPI_API_KEY}"
    lunarcrush:
      enabled: true
      api_key: "${LUNARCRUSH_API_KEY}"
  llm:
    model: gpt-4o-mini
    max_tokens: 500
    temperature: 0.1
  thresholds:
    strong_bullish: 0.5
    strong_bearish: -0.5
    min_news_count: 3

risk_guardian:
  check_interval_sec: 30
  limits:
    max_drawdown_pct: 0.20
    max_daily_loss_pct: 0.05
    max_positions: 5
    max_exposure_pct: 0.30
    max_loss_per_position: 0.10
  kill_switch:
    enabled: true
    auto_close_positions: true
    manual_reset_required: true
  volatility:
    atr_spike_multiplier: 3.0
  api_health:
    max_consecutive_errors: 10

database:
  url: "${DATABASE_URL:sqlite:///fkcrypto.db}"

decision:
  weights:
    technical: 0.30
    sentiment: 0.20
    momentum: 0.20
    risk: 0.15
    alpha: 0.15
    ml: 0.10
    on-chain: 0.05
  thresholds:
    buy: 0.6
    sell: -0.6
    min_confidence: 0.5
  confidence_boost:
    agreement_bonus: 0.15
    max_confidence: 0.95
  explanation:
    enabled: true

execution:
  freqtrade_url: "${FREQTRADE_API_URL}"
  freqtrade_api_key: "${FREQTRADE_API_KEY}"
  rate_limit: 10
  dry_run: true
  approval:
    enabled: false
    timeout_sec: 300

alpha_seeker:
  check_interval_sec: 60
  sources:
    exchange_news:
      enabled: true
    whale_alert:
      enabled: false
      api_key: ""
    influencer:
      enabled: false
      bearer_token: ""
  override:
    can_override_technical: true
    min_priority: "high"
  influencers:
    - "elonmusk"
    - "VitalikButerin"
    - "cz_binance"

security:
  max_injection_alerts_per_hour: 10
  auto_block_threat_level: "high"

schedule:
  analyst_interval_minutes: 5
  news_interval_minutes: 15
  risk_check_interval_seconds: 30
  portfolio_snapshot_interval_minutes: 60

notifications:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
