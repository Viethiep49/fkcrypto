# FKCrypto — Exchange Configurations
# Per-exchange settings for CCXT-backed trading.

binance:
  enabled: true
  role: main
  api_key: "${BINANCE_API_KEY}"
  secret: "${BINANCE_SECRET}"
  testnet: false
  rate_limit_per_minute: 1200
  supported_timeframes:
    - 1m
    - 3m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 4h
    - 6h
    - 8h
    - 12h
    - 1d
  supported_pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
  websocket:
    url: wss://stream.binance.com:9443/ws
    stream_url: wss://stream.binance.com:9443/stream
    ping_interval: 30

bybit:
  enabled: true
  role: backup
  api_key: "${BYBIT_API_KEY}"
  secret: "${BYBIT_SECRET}"
  testnet: false
  rate_limit_per_minute: 600
  supported_timeframes:
    - 1m
    - 3m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 4h
    - 1d
  supported_pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
  websocket:
    url: wss://stream.bybit.com/v5/public/spot
    ping_interval: 30

okx:
  enabled: true
  role: secondary
  api_key: "${OKX_API_KEY}"
  secret: "${OKX_SECRET}"
  passphrase: "${OKX_PASSPHRASE}"
  testnet: false
  rate_limit_per_minute: 600
  supported_timeframes:
    - 1m
    - 3m
    - 5m
    - 15m
    - 30m
    - 1h
    - 2h
    - 4h
    - 1d
  supported_pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
  websocket:
    url: wss://ws.okx.com:8443/ws/v5/public
    ping_interval: 30
