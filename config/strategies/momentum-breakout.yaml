name: momentum-breakout
version: "1.0"
description: "Giao dịch breakout — phát hiện giá phá vỡ kháng cự với volume mạnh, theo đà tăng"
category: momentum
timeframes: ["5m", "15m", "1h"]
pairs: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "DOGE/USDT"]

weight: 0.30

entry:
  conditions:
    - indicator: DonchianChannel
      params: {period: 20}
      rule: "price >= upper_band"
      label: "Price breaks upper Donchian channel"

    - indicator: Volume
      params: {period: 20}
      rule: "current > sma * 2.0"
      label: "Volume 2x average on breakout"

    - indicator: ATR
      params: {period: 14}
      rule: "current > sma * 1.3"
      label: "ATR expanding"

    - indicator: MACD
      params: {fast: 12, slow: 26, signal: 9}
      rule: "histogram > 0 AND histogram > histogram[1]"
      label: "MACD histogram bullish and increasing"

  min_conditions: 3

exit:
  conditions:
    - indicator: DonchianChannel
      params: {period: 20}
      rule: "price <= middle_band"
      label: "Price falls back to middle channel"

    - indicator: MACD
      params: {fast: 12, slow: 26, signal: 9}
      rule: "histogram < histogram[1]"
      label: "MACD histogram declining"

  min_conditions: 1

risk:
  stop_loss:
    type: "atr"
    multiplier: 1.5
  take_profit:
    type: "risk_reward"
    ratio: 3.0
  trailing_stop:
    enabled: true
    activation_pct: 0.02
    trail_pct: 0.01

confidence:
  base: 0.55
  boosters:
    - condition: "volume > sma * 3.0"
      bonus: 0.15
    - condition: "breakout_after_consolidation > 3h"
      bonus: 0.15
    - condition: "market_cap_rank <= 20"
      bonus: 0.05
  max_confidence: 0.90

enabled: true
