services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: fkcrypto-gateway
    env_file:
      - .env
      - .env.docker
    ports:
      - "8000:8000"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: fkcrypto-freqtrade
    env_file:
      - .env
    volumes:
      - freqtrade_data:/freqtrade/config
      - freqtrade_data:/freqtrade/user_data
      - freqtrade_data:/freqtrade/trades
    ports:
      - "8080:8080"
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/trades/tradesv3.sqlite
      --config /freqtrade/config/config.json
      --strategy SampleStrategy

  redis:
    image: redis:7-alpine
    container_name: fkcrypto-redis
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: fkcrypto-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-fkcrypto}
      POSTGRES_USER: ${DB_USER:-fkcrypto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fkcrypto} -d ${DB_NAME:-fkcrypto}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: fkcrypto-dashboard
    env_file:
      - .env
      - .env.docker
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fkcrypto-nginx
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      gateway:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: fkcrypto-litellm
    env_file:
      - .env
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      DATABASE_URL: postgresql://${DB_USER:-fkcrypto}:${DB_PASSWORD:-changeme}@postgres:5432/litellm
    volumes:
      - ../litellm_config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fkcrypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles:
      - litellm

  prometheus:
    image: prom/prometheus:latest
    container_name: fkcrypto-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fkcrypto-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: fkcrypto-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - fkcrypto-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  fkcrypto-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  freqtrade_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
