global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fkcrypto-gateway'
    static_configs:
      - targets: ['gateway:9090']
        labels:
          service: 'gateway'

  - job_name: 'fkcrypto-redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  - job_name: 'fkcrypto-postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
